  <!-- Hexagon — visible violet fill -->
  <polygon points="256,32 464,144 464,368 256,480 48,368 48,144"
    fill="#2d1060" stroke="#8b5cf6" stroke-width="22" stroke-linejoin="round"/>
  <!-- N letter — white bold -->
