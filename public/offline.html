<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d14; color: #f1f0f9; font-family: 'Sora', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .logo { width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, #8b5cf6, #06b6d4); display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 24px; }
    h1 { font-size: 28px; font-weight: 900; background: linear-gradient(135deg, #a78bfa, #67e8f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
    button { background: linear-gradient(135deg, #7c3aed, #0891b2); color: white; border: none; border-radius: 14px; padding: 14px 32px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="logo">⬡</div>
  <h1>NEXUS</h1>
  <p>Tu es hors ligne.<br>Vérifie ta connexion internet pour accéder à NEXUS.</p>
  <button onclick="location.reload()">Réessayer</button>
</body>
</html>
